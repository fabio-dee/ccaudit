name: CI

on:
  push:
    branches: [main, public-main-private-mirror]
  pull_request:
    branches: [main, public-main-private-mirror]

permissions: read-all

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 22
          - os: ubuntu-latest
            node-version: 20
          - os: macos-latest
            node-version: 22
          - os: windows-latest
            node-version: 22
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm exec vitest --run --coverage

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      # Verify binary executes
      - run: node apps/ccaudit/dist/index.js --help
      # Verify shebang preserved
      - run: head -1 apps/ccaudit/dist/index.js | grep -q '#!/usr/bin/env node'
      # Verify in-source tests stripped
      - run: "! grep -q 'import.meta.vitest' apps/ccaudit/dist/index.js"
      # Verify zero runtime deps in pack output
      - run: cd apps/ccaudit && npm pack --dry-run 2>&1
