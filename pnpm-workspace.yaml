packages:
  - 'apps/*'
  - 'packages/*'
  - 'docs'

catalog:
  # CLI Runtime (all bundled as devDeps)
  gunshi: ^0.29.3
  valibot: ^1.3.1
  tinyglobby: ^0.2.15
  cli-table3: ^0.6.5
  '@praha/byethrow': ^0.10.1
  picocolors: ^1.1.1

  # Build
  tsdown: ^0.21.7
  vitest: ^4.1.2
  clean-pkg-json: ^1.4.1
  typescript: ^6.0.2

  # Lint & Format
  eslint: ^10.1.0
  typescript-eslint: ^8.58.0
  '@eslint/js': ^10.0.1
  oxfmt: ^0.43.0

  # Types
  '@types/node': ^25.5.2

  # Release
  bumpp: ^11.0.1
  changelogithub: ^14.0.0
  only-allow: ^1.2.2

catalogMode: strict

# Supply-chain security (ccusage pattern)
strictDepBuilds: true
blockExoticSubdeps: true
